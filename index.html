<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>小麦粉クイズ！</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f8ff; }
        #game-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; width: 350px; }
        #food-emoji { font-size: 80px; margin: 20px 0; }
        .btn-container { display: flex; justify-content: space-around; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; transition: 0.2s; }
        .btn-yes { background-color: #ff6b6b; color: white; }
        .btn-no { background-color: #4ecdc4; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        #message { margin-top: 20px; font-weight: bold; min-height: 1.2em; }
        #score { margin-top: 10px; color: #666; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>この食べ物に<br>小麦粉は入ってる？</h2>
        
        <!-- イラストの代わりに絵文字を使用（手軽で視認性が良いため） -->
        <div id="food-emoji">❓</div>
        <div id="food-name" style="font-size: 20px; font-weight: bold;">準備中...</div>

        <div class="btn-container">
            <button class="btn-yes" onclick="checkAnswer(true)">入っている</button>
            <button class="btn-no" onclick="checkAnswer(false)">入っていない</button>
        </div>

        <div id="message"></div>
        <div id="score">正解数: 0</div>
        <button onclick="nextQuestion()" style="margin-top:20px; background:#ddd;">次の問題へ</button>
    </div>

    <script>
        // クイズのデータ
        const foodData = [
            { name: "パン", emoji: "🍞", hasFlour: true },
            { name: "おにぎり", emoji: "🍙", hasFlour: false },
            { name: "うどん", emoji: "🍜", hasFlour: true },
            { name: "ステーキ", emoji: "🥩", hasFlour: false },
            { name: "ケーキ", emoji: "🍰", hasFlour: true },
            { name: "りんご", emoji: "🍎", hasFlour: false },
            { name: "パスタ", emoji: "🍝", hasFlour: true },
            { name: "刺身", emoji: "🐟", hasFlour: false },
            { name: "クッキー", emoji: "🍪", hasFlour: true },
            { name: "豆腐", emoji: "⬜", hasFlour: false }
        ];

        let currentIndex = 0;
        let score = 0;
        let canAnswer = true;

        function updateDisplay() {
            const food = foodData[currentIndex];
            document.getElementById('food-emoji').textContent = food.emoji;
            document.getElementById('food-name').textContent = food.name;
            document.getElementById('message').textContent = "";
            canAnswer = true;
        }

        function checkAnswer(userChoice) {
            if (!canAnswer) return;
            
            const food = foodData[currentIndex];
            const messageElement = document.getElementById('message');
            
            if (userChoice === food.hasFlour) {
                messageElement.textContent = "⭕ 正解！";
                messageElement.style.color = "red";
                score++;
            } else {
                messageElement.textContent = "❌ 残念！";
                messageElement.style.color = "blue";
            }
            
            document.getElementById('score').textContent = `正解数: ${score}`;
            canAnswer = false;
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % foodData.length;
            updateDisplay();
        }

        // 初回実行
        updateDisplay();
    </script>
</body>
</html>
