<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワンチャン起きる - フル時間割版</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --primary-color: #ff5a5f;
            --private-color: #f472b6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 375px;
            height: 780px;
            background-color: #fafafa;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 8px solid #333;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #ff5a5f, #ff7e40);
            color: white;
            padding: 25px 20px 15px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: bold; }

        /* ─────────────── 💡 JS不要で切り替えるための魔法のCSS ─────────────── */
        /* ラジオボタン自体は隠す */
        .tab-switch { display: none; }

        .tab-bar {
            display: flex;
            background-color: rgba(0, 0, 0, 0.06);
            padding: 4px;
            margin: 10px 15px;
            border-radius: 12px;
        }

        /* タブのボタン（見た目） */
        .tab-label {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            color: #6b7280;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        /* 初期状態では両方の画面を隠す */
        .mode-page { display: none; padding: 0 20px 20px; flex: 1; overflow-y: auto; }
